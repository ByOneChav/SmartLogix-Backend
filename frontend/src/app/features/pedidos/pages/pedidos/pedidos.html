<!-- HEADER -->
<div class="header">
  <h1>Gestión de Pedidos</h1>
</div>

<div class="container">

  <!-- FORMULARIO -->
  <div class="form-card">
    <h2>{{ editando ? 'Actualizar Pedido' : 'Registrar Pedido' }}</h2>

    <form (ngSubmit)="guardar()">

      <input [(ngModel)]="nuevo.descripcion" name="descripcion"
             placeholder="Descripción" required>

      <input [(ngModel)]="nuevo.cantidad" name="cantidad"
             type="number" placeholder="Cantidad" required>

      <input [(ngModel)]="nuevo.precio" name="precio"
             type="number" placeholder="Precio" required>

      <input [(ngModel)]="nuevo.inventarioId" name="inventarioId"
             type="number" placeholder="ID de Inventario" required>

      <button type="submit" class="btn-primary">
        {{ editando ? 'Actualizar' : 'Guardar' }}
      </button>

    </form>
  </div>

  <!-- TABLA -->
  <div class="table-card">
    <h2>Lista de Pedidos</h2>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Descripción</th>
          <th>Cantidad</th>
          <th>Precio</th>
          <th>Inventario ID</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of pedidos">
          <td>{{ item.id }}</td>
          <td>{{ item.descripcion }}</td>
          <td>{{ item.cantidad }}</td>
          <td>${{ item.precio }}</td>
          <td>{{ item.inventarioId }}</td>
          <td>
            <button class="btn-edit" (click)="editar(item)">Editar</button>
            <button class="btn-delete" (click)="eliminar(item.id!)">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

<!-- MODAL -->
<div class="modal" *ngIf="modalVisible">
  <div class="modal-content">
    <span class="spinner-modal"></span>
    <p>{{ mensajeModal }}</p>
  </div>
</div>
