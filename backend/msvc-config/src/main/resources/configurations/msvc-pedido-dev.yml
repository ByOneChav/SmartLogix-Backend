spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/pedidodb
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

eureka:
  instance:
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

app:
  cors:
    allowed-origins: http://localhost:4200
