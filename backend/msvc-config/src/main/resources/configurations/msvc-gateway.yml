eureka: 
  client:
    register-with-eureka: true

server:
  port: 8080

spring:
  application:
    name: msvc-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: authService
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
        - id: pedido
          uri: http://localhost:8082
          predicates:
            - Path=/api/pedido/**
        - id: inventario
          uri: http://localhost:8083
          predicates:
            - Path=/api/inventario/**
        - id: envio
          uri: http://localhost:8084
          predicates:
            - Path=/api/envio/**